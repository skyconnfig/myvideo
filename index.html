<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的视频库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 30px 20px;
      text-align: center;
      border-bottom: 1px solid #2a2a4a;
    }
    h1 { font-size: 28px; color: #64ffda; margin-bottom: 8px; }
    header p { color: #888; font-size: 14px; }
    header p span { color: #64ffda; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .video-card {
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid #2a2a4a;
    }
    .video-card .info {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a4a;
    }
    .video-card .info .name { font-weight: 600; font-size: 15px; }
    .video-card .info .size { color: #888; font-size: 13px; }
    video {
      width: 100%;
      display: block;
      background: #000;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #64ffda;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #ff6b6b;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .footer {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 13px;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #888;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #2a2a4a;
      color: #64ffda;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #64ffda;
      color: #000;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <h1>我的视频库</h1>
    <p>通过 <span>GitHub API</span> 自动检测视频列表</p>
  </header>

  <div class="container" id="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>正在加载视频列表...</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    Powered by GitHub Raw
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const OWNER = 'skyconnfig';
    const REPO = 'myvideo';
    const BRANCH = 'main';
    const VIDEOS_PATH = 'videos';

    // 支持播放的视频格式
    const VIDEO_EXTENSIONS = ['.mp4', '.webm', '.ogg', '.mov', '.avi', '.mkv'];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function getVideoUrl(filename) {
      return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${VIDEOS_PATH}/${filename}`;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    async function loadVideos() {
      const container = document.getElementById('app');
      const footer = document.getElementById('footer');

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${VIDEOS_PATH}`);
        if (!res.ok) throw new Error('API 请求失败 (HTTP ' + res.status + ')');

        const files = await res.json();
        const videos = files.filter(f =>
          f.type === 'file' && VIDEO_EXTENSIONS.some(ext => f.name.toLowerCase().endsWith(ext))
        );

        if (videos.length === 0) {
          container.innerHTML = '<div class="empty">暂无视频文件</div>';
          return;
        }

        container.innerHTML = '';
        videos.sort((a, b) => a.name.localeCompare(b.name));

        videos.forEach(v => {
          const card = document.createElement('div');
          card.className = 'video-card';

          card.innerHTML = `
            <div class="info">
              <span class="name">${v.name}</span>
              <span class="size">${formatSize(v.size)}</span>
            </div>
            <video src="${getVideoUrl(v.name)}" controls preload="metadata"></video>
          `;

          container.appendChild(card);
        });

        footer.style.display = 'block';

      } catch (err) {
        container.innerHTML = `<div class="error">加载失败：${err.message}</div>`;
      }
    }

    loadVideos();
  </script>
</body>
</html>
